name: Traffizy → Telegram

on:
  schedule:
    - cron: "0 * * * *"   # каждый час
  workflow_dispatch:        # ручной запуск для теста

jobs:
  send-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: traffizy-state-${{ github.run_id }}
          restore-keys: traffizy-state-

      - name: Run
        env:
          TRAFFIZY_EMAIL:    ${{ secrets.TRAFFIZY_EMAIL }}
          TRAFFIZY_PASSWORD: ${{ secrets.TRAFFIZY_PASSWORD }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: traffizy-state-${{ github.run_id }}
