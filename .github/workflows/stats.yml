name: Traffizy → Telegram

on:
  schedule:
    # Каждый час
    - cron: "0 * * * *"
  workflow_dispatch:   # ручной запуск для теста

jobs:
  send-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Восстанавливаем state.json между запусками (нужен для алертов)
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: traffizy-state-${{ github.run_id }}
          restore-keys: |
            traffizy-state-

      - name: Run
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATISTIC_TOKEN:  ${{ secrets.STATISTIC_TOKEN }}
        run: python scraper.py

      # Сохраняем state.json для следующего запуска
      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: traffizy-state-${{ github.run_id }}
